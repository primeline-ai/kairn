name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # The full suite finishes in ~25s and exits on its own; a hang at
    # interpreter shutdown (leaked non-daemon thread) is a regression this
    # timeout is meant to catch, not accommodate.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,team]"
      - name: Test
        run: pytest tests/ -q
